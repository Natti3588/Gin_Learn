services:

  postgres:
    image: postgres:16-alpine
    container_name: glog-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - glog-pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: glog-backend
    environment:
      - PORT=${PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
    depends_on:
      - postgres
  
  nginx:
    build: ./infra
    container_name: glog-nginx
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  glog-pgdata: