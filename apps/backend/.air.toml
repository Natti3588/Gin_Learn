root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  poll = true
  poll_interval = 1000
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "docs"]
  delay = 1000
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
