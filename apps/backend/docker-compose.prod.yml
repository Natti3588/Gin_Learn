# 本番用（EC2）: nginx(リバースプロキシ) + app(Gin) + postgres
# 起動: docker compose -f docker-compose.prod.yml up -d --build
# ※ 同ディレクトリの .env から DB_USER / DB_PASSWORD / DB_NAME を読み込む
services:
  postgres:
    image: postgres:16-alpine
    container_name: glog-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - glog-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # postgres はホストに公開しない（compose 内ネットワークのみ）

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glog-app
    environment:
      DB_HOST: postgres        # サービス名で名前解決
      DB_PORT: 5432            # コンテナ内ポート
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: 8080
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy   # postgres が ready になってから起動
    restart: unless-stopped
    # app もホストに公開しない（nginx 経由でのみアクセス）

  nginx:
    image: nginx:alpine
    container_name: glog-nginx
    ports:
      - "80:80"               # 外部公開はここだけ（CloudFront のオリジン）
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  glog-pgdata:
